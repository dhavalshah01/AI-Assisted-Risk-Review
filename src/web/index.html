<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI-Assisted Broker Portfolio Risk Review</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Serif+Display&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        /* Financial terminal palette */
        --bg-primary:    #0a0e17;
        --bg-secondary:  #111827;
        --bg-card:       #151d2e;
        --bg-elevated:   #1a2332;
        --border-subtle: #1e2a3a;
        --border-default:#2a3548;
        --border-active: #d4a853;
        --text-primary:  #e8edf5;
        --text-secondary:#8b97a8;
        --text-muted:    #5a6a7e;
        --gold:          #d4a853;
        --gold-dim:      #a07d3a;
        --gold-glow:     rgba(212,168,83,0.12);
        --green:         #34d399;
        --green-bg:      rgba(52,211,153,0.08);
        --red:           #f87171;
        --red-bg:        rgba(248,113,113,0.08);
        --blue:          #60a5fa;
        --blue-bg:       rgba(96,165,250,0.08);
        --amber:         #fbbf24;
        --amber-bg:      rgba(251,191,36,0.08);
        --font-sans:     'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        --font-serif:    'DM Serif Display', 'Georgia', serif;
        --font-mono:     'JetBrains Mono', 'Fira Code', monospace;
      }

      *, *::before, *::after { box-sizing: border-box; }

      body {
        margin: 0;
        padding: 0;
        background: var(--bg-primary);
        color: var(--text-primary);
        font-family: var(--font-sans);
        -webkit-font-smoothing: antialiased;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      @keyframes blink {
        50% { opacity: 0; }
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes pulseGold {
        0%, 100% { box-shadow: 0 0 0 0 rgba(212,168,83,0.25); }
        50%      { box-shadow: 0 0 16px 4px rgba(212,168,83,0.10); }
      }
      @keyframes slideRight {
        from { transform: translateX(-4px); opacity: 0; }
        to   { transform: translateX(0); opacity: 1; }
      }
      @keyframes shimmer {
        0%   { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 5px; }
      ::-webkit-scrollbar-track { background: var(--bg-primary); }
      ::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

      /* Selection */
      ::selection { background: rgba(212,168,83,0.25); color: #fff; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
